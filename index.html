<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="src/styles.css" />
    <title>Frontend Mentor | Product list with cart</title>
  </head>
  <body>
    <div class="page-wrapper">
      <main class="container">
        <section class="product-list">
          <h1>Desserts</h1>
          <div class="product-grid" id="product-grid">
            <div class="product-card">
              <div class="image-container">
                <img
                  src="./assets/images/image-waffle-desktop.jpg"
                  alt="Waffle with Berries"
                  class="product-image"
                />

                <div class="button-container">
                  <button class="add-to-cart-btn">
                    <img src="./assets/images/icon-add-to-cart.svg" alt="" />
                    Add to Cart
                  </button>

                  <div class="quantity-selector" style="display: none">
                    <button class="decrement-btn">
                      <img
                        src="./assets/images/icon-decrement-quantity.svg"
                        alt="Decrease"
                      />
                    </button>
                    <span class="quantity">1</span>
                    <button class="increment-btn">
                      <img
                        src="./assets/images/icon-increment-quantity.svg"
                        alt="Increase"
                      />
                    </button>
                  </div>
                </div>
              </div>
              <div class="product-info">
                <p class="category">Waffle</p>
                <h3 class="name">Waffle with Berries</h3>
                <p class="price">$6.50</p>
              </div>
            </div>
          </div>
        </section>
        <aside class="cart-container">
          <div class="cart-content">
            <h2>Your Cart (0)</h2>
            <div class="cart-empty" id="cart-empty">
              <img
                src="./assets/images/illustration-empty-cart.svg"
                alt="Empty Cart"
              />
              <p>Your added items will appear here</p>
            </div>
            <div class="cart-items" id="cart-items" style="display: none"></div>
          </div>
        </aside>
      </main>
    </div>
    <div id="confirmation-modal" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <img
          src="./assets/images/icon-order-confirmed.svg"
          alt=""
          class="confirmation-icon"
        />
        <h1>Order Confirmed</h1>
        <p class="modal-subtitle">We hope you enjoy your food!</p>
        <div id="order-summary" class="order-summary"></div>
        <button id="new-order-btn" class="confirm-btn">Start New Order</button>
      </div>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
